- type: entity
  parent: BaseAction
  id: ActionRetractableItemArmBlade
  name: Arm Blade
  description: Shed your flesh and reform it into a fleshy blade.
  components:
  - type: Action
    useDelay: 2
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/changeling.rsi
      state: armblade
  - type: InstantAction
    event: !type:OnRetractableItemActionEvent
  - type: RetractableItemAction
    spawnedPrototype: ArmBlade
    summonSounds:
      collection: gib # Placeholder
    retractSounds:
      collection: gib # Placeholder

- type: entity
  parent: BaseAction
  id: ActionChangelingBiodegrade
  name: Biodegrade
  description: Vomit acid over your restraints, setting yourself free.
  components:
  - type: Action
    useDelay: 60 # TODO: Short cooldown but chemical cost
    raiseOnAction: true
    itemIconStyle: BigAction
    checkCanInteract: false
    icon:
      sprite: Interface/Actions/changeling2.rsi
      state: biodegrade
  - type: InstantAction
    event: !type:ChangelingBiodegradeActionEvent
  - type: ChangelingBiodegradeAbility

- type: entity
  parent: BaseAction
  id: ActionChangelingMuteSting
  name: Mute Sting
  description: Silently sting a target and inject mute toxin.
  components:
  - type: Action
    useDelay: 60
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/changeling2.rsi
      state: biodegrade
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
      - Bloodstream
    event: !type:ChangelingStingActionEvent
  - type: ChangelingStingAbility
    injectSolution:
      reagents:
      - ReagentId: MuteToxin
        Quantity: 5

- type: entity
  parent: BaseAction
  id: ActionChangelingBlindSting
  name: Blind Sting
  description: Silently sting a target and worsen their sight after a short delay.
  components:
  - type: Action
    useDelay: 60
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/changeling2.rsi
      state: biodegrade
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
      - Bloodstream
    event: !type:ChangelingStingActionEvent
  - type: ChangelingStingAbility
    injectSolution:
      reagents:
      - ReagentId: NorepinephricAcid
        Quantity: 25

- type: entity
  parent: BaseAction
  id: ActionChangelingHallucinationSting
  name: Hallucination Sting
  description: Silently sting a target and flood their mind with hallucinogens.
  components:
  - type: Action
    useDelay: 60
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/changeling2.rsi
      state: biodegrade
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
      - Bloodstream
    event: !type:ChangelingStingActionEvent
  - type: ChangelingStingAbility
    injectSolution:
      reagents:
      - ReagentId: MindbreakerToxin
        Quantity: 10
      - ReagentId: Psicodine
        Quantity: 10

- type: entity
  id: ActionChangelingDevour
  name: "[color=red]Devour[/color]"
  description: Consume the essence of your victims and subsume their identity and mind into your own.
  components:
  - type: Action
    icon: { sprite : Interface/Actions/changeling.rsi, state: "devour" }
    iconOn: { sprite : Interface/Actions/changeling.rsi, state: "devour_on" }
    priority: 1
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:ChangelingDevourActionEvent

- type: entity
  id: ActionChangelingTransform
  name: "[color=red]Transform[/color]"
  description: Transform and assume the identities of those you have devoured.
  components:
  - type: Action
    icon: { sprite : Interface/Actions/changeling.rsi, state: "transform" }
  - type: InstantAction
    event: !type:ChangelingTransformActionEvent

- type: entity
  parent: ActionIntrinsicStore
  id: ActionChangelingStore
  name: DNA Store
  description: Opens the ability store.

- type: entity
  parent: BaseAction
  id: ActionChangelingVoiceMimic
  name: Voice Mimicry
  description: Model your vocal cords to imitate the voice of someone else.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/changeling2.rsi
      state: mimicry
  - type: InstantAction
    event: !type:VoiceMaskSetNameEvent
