- type: disease
  id: DiseaseCold
  name: disease-DiseaseCold-name
  desc: disease-DiseaseCold-desc
  spreadPath: [ Airborne ]
  permeabilityMod: 0.5
  cureSteps:
  - !type:CureConditions
    cureChance: 0.08
    conditions:
    - !type:ReagentCondition
      reagent: Spaceacillin
      min: 1
  - !type:CureConditions
    cureChance: 0.2
    conditions:
    - !type:TemperatureCondition
      min: 309.15
  stages:
  - stage: 1
    # no-op
  - stage: 2
    sensations:
    - messages: [ "disease-sensation-throat-sore", "disease-sensation-throat-mucus" ]
      probability: 0.05
    symptoms:
    - symptom: SymptomCough
    - symptom: SymptomSneeze
    cureSteps:
    - !type:CureBedrest
      bedrestChance: 0.10
      sleepMultiplier: 4
  - stage: 3
    sensations:
    - messages: [ "disease-sensation-throat-sore", "disease-sensation-throat-mucus" ]
      probability: 0.05
    symptoms:
    - symptom: SymptomCough
    - symptom: SymptomSneeze
    - symptom: SymptomFever
    - symptom: SymptomTransitionToFlu
    cureSteps:
    - !type:CureBedrest
      bedrestChance: 0.05
      sleepMultiplier: 5

- type: disease
  id: DiseaseCold9
  name: disease-DiseaseCold9-name
  desc: disease-DiseaseCold9-desc
  spreadPath: [ Contact ]
  cureSteps:
  - !type:CureConditions
    cureChance: 0.15 # Higher chance to cure, since two reagents are required.
    conditions:
    - !type:ReagentCondition
      reagent: Spaceacillin
      min: 1
    - !type:ReagentCondition
      reagent: Leporazine
      min: 1
  stages:
  - stage: 1
    # no-op
  - stage: 2
    sensations:
    - messages: [ "disease-sensation-throat-sore", "disease-sensation-stiff" ]
      probability: 0.05
    symptoms:
    - symptom: SymptomCough
      probability: 0.02
    - symptom: SymptomSneeze
      probability: 0.02
    - symptom: SymptomFreezeLight
  - stage: 3
    sensations:
    - messages: [ "disease-sensation-throat-sore", "disease-sensation-stiff" ]
      probability: 0.05
    symptoms:
    - symptom: SymptomCough
      probability: 0.04
    - symptom: SymptomSneeze
      probability: 0.04
    - symptom: SymptomFreeze

- type: disease
  id: DiseaseFlu
  name: disease-DiseaseFlu-name
  desc: disease-DiseaseFlu-desc
  spreadPath: [ Airborne ]
  permeabilityMod: 0.75
  cureSteps:
  - !type:CureConditions
    cureChance: 0.1
    conditions:
    - !type:ReagentCondition
      reagent: Spaceacillin
      min: 1
  - !type:CureWait
    requiredTicks: 300
    cureChance: 0.5
  stages:
  - stage: 1
    # no-op
  - stage: 2
    sensations:
    - messages: [ "disease-sensation-muscles-ache", "disease-sensation-stomach-hurt" ]
      probability: 0.05
    symptoms:
    - symptom: SymptomCough
    - symptom: SymptomSneeze
    - symptom: SymptomToxinLight
    cureSteps:
    - !type:CureBedrest
      bedrestChance: 0.20
      sleepMultiplier: 1
      lowerStage: true
  - stage: 3
    sensations:
    - messages: [ "disease-sensation-muscles-ache", "disease-sensation-stomach-hurt" ]
      probability: 0.05
    symptoms:
    - symptom: SymptomCough
    - symptom: SymptomSneeze
    - symptom: SymptomToxinLight
    cureSteps:
    - !type:CureBedrest
      bedrestChance: 0.15
      sleepMultiplier: 1
      lowerStage: true
